project:
  name: "Art-Xplain"
paths:
  # Root folder where you unzipped the Kaggle dataset steubk/wikiart
  kaggle_root: "data/kaggle"
  # Optional hint to where images live under kaggle_root (leave as-is if unsure)
  images_subdir_hint: "images"
  # Output folder with Keras-ready splits: train/val/test/<style>/*.jpg
  keras_root: "data/keras"
  # Where embeddings will be stored (npy files)
  embeddings_root: "embeddings"
  # Where models will be stored
  models_root: "models"
dataset:
  # Keep only the top N styles (recommended 5-10 for a student project)
  keep_top_styles: 10
  # Minimum images required to keep a style
  min_images_per_style: 300
  # Split ratios
  test_size: 0.1
  val_size: 0.1

